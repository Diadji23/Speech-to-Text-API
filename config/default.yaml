# ── Audio ──
audio:
  sample_rate: 16000          # Whisper attend 16kHz
  channels: 1                 # Mono
  chunk_duration: 5           # Durée d'un chunk en secondes (temps réel)
  format: "wav"

# ── Preprocessing ──
preprocessing:
  vad_enabled: true           # Voice Activity Detection
  vad_threshold: 0.4         # Seuil énergie pour détecter la voix
  normalize: true             # Normaliser le volume
  target_db: -20.0            # Niveau cible en dB

# ── Transcription ──
transcription:
  model_size: "base"          # tiny, base, small, medium, large
  language: "fr"              # null = auto-detect
  device: "auto"              # auto, cpu, cuda
  fp16: false                 # Float16 (GPU only)
  beam_size: 5                # Beam search width
  temperature: 0.0            # 0 = greedy, >0 = sampling

# ── Postprocessing ──
postprocessing:
  add_punctuation: true
  remove_filler_words: true   # "euh", "hum", etc.
  filler_words:
    - "euh"
    - "hum"
    - "bah"
    - "ben"
    - "genre"

# ── Evaluation ──
evaluation:
  metrics:
    - "wer"                   # Word Error Rate
    - "cer"                   # Character Error Rate
  num_benchmark_runs: 3       # Moyenne sur N runs pour latence

# ── API ──
api:
  host: "0.0.0.0"
  port: 8000
  max_file_size_mb: 25
  cors_origins:
    - "http://localhost:3000"

# ── Logging ──
logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
